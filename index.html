<!DOCTYPE html>
<html>
<head>
<title>Norton Ranch Dashboard</title>
<style>
body {
  font-family: Arial;
  background: #e8f5e9;
  text-align: center;
}

.dashboard {
  width: 800px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  margin: 15px;
  border-radius: 15px;
  box-shadow: 0 3px 10px #aaa;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="dashboard">

<h1>🌿 Norton Ranch 🌿</h1>
<h2>Farm Management Dashboard</h2>


<div class="card">
<h2>🏡 Ranch Status</h2>

<p>Weather: ☀️ Sunny</p>
<p>Season: 🌱 Spring</p>
<p>Ranch Health: <span id="health">Excellent</span></p>

</div>


<div class="card">

<h2>🐄 Livestock</h2>

<p>Cows: <span id="cows">75</span></p>
<p>Chickens: <span id="chickens">80</span></p>
<p>Horses: <span id="horses">6</span></p>

<button onclick="feedAnimals()">Feed Animals 🐄</button>

</div>


<div class="card">

<h2>🌾 Crops</h2>

<p>Crop Growth: <span id="crops">60</span>%</p>

<button onclick="waterCrops()">Water Crops 💧</button>

</div>


<div class="card">

<h2>💰 Finances</h2>

<p>Money: $<span id="money">45000</span></p>

<button onclick="sellProducts()">Sell Products 🧺</button>

</div>


<div class="card">

<h2>📋 Ranch Tasks</h2>

<p id="task">
No tasks completed yet
</p>

<button onclick="completeTask()">Complete Task ✅</button>

</div>


</div>


<script>

let money = 45000;
let crops = 60;
let cows = 75;


function feedAnimals(){

cows++;

document.getElementById("cows").innerHTML=cows;

document.getElementById("health").innerHTML="Excellent ⭐";

document.getElementById("task").innerHTML=
"Animals fed successfully 🐄";

}


function waterCrops(){

crops += 5;

if(crops > 100){
crops = 100;
}

document.getElementById("crops").innerHTML=crops;

document.getElementById("task").innerHTML=
"Crops watered 🌱";

}


function sellProducts(){

money += 2500;

document.getElementById("money").innerHTML=money;

document.getElementById("task").innerHTML=
"Products sold 🧺";

}


function completeTask(){

document.getElementById("task").innerHTML=
"Daily ranch work completed 🎉";

}


</script>

</body>
</html>
